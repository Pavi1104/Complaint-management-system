<html>
    <head>
         <title>Register</title>
         <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="style.css">
    </head>


<body class="bg-gradient-to-r from-green-500 to-teal-600 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-sm">
    <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">
      Create Account
    </h2>

    <!-- Name -->
    <input id="name" type="text" placeholder="Full Name"
      class="w-full mb-3 p-3 border rounded focus:ring-2 focus:ring-green-500">

    <!-- Email -->
    <input id="email" type="email" placeholder="Email"
      class="w-full mb-3 p-3 border rounded focus:ring-2 focus:ring-green-500">

    <!-- Password -->
    <input id="password" type="password" placeholder="Password"
      class="w-full mb-3 p-3 border rounded focus:ring-2 focus:ring-green-500">

    <!-- Confirm Password -->
    <input id="confirmPassword" type="password" placeholder="Confirm Password"
      class="w-full mb-4 p-3 border rounded focus:ring-2 focus:ring-green-500">

    <!-- Register Button -->
    <button onclick="clickSound.play(); register()"
      class="w-full bg-green-600 text-white py-3 rounded hover:bg-green-700 transition">
      Register
    </button>
    

    <!-- Login Redirect -->
    <p class="text-center text-sm mt-4 text-gray-500 cursor-pointer">
      Already have an account? <span class="text-blue-600 cursor-pointer"
        onclick="window.location.href='login.html'">
    Login
  </span>
    </p>
  </div>

<script>
const clickSound = new Audio("sounds/click.mp3");

async function register() {
  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  if (!name || !email || !password || !confirmPassword) {
    alert("All fields are required");
    return;
  }

  if (password !== confirmPassword) {
    alert("Passwords do not match");
    return;
  }

  const res = await fetch("http://localhost:5000/api/auth/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ name, email, password })
  });

  const data = await res.json();

  if (res.ok) {
    alert("Registration successful. Please login.");
    window.location.href = "login.html";
  } else {
    alert(data.message || "Registration failed");
  }
}
</script>

</body>
</html>
