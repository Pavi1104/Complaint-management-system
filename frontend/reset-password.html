<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-purple-500 to-indigo-600 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-sm">
    <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">
      Reset Password
    </h2>

    <!-- Email -->
    <input id="email" type="email" placeholder="Email"
      class="w-full mb-3 p-3 border rounded focus:ring-2 focus:ring-indigo-500">

    <!-- OTP -->
    <input id="otp" type="text" placeholder="Enter OTP"
      class="w-full mb-3 p-3 border rounded focus:ring-2 focus:ring-indigo-500">

    <!-- New Password -->
    <input id="newPassword" type="password" placeholder="New Password"
      class="w-full mb-3 p-3 border rounded focus:ring-2 focus:ring-indigo-500">

    <!-- Confirm Password -->
    <input id="confirmPassword" type="password" placeholder="Confirm Password"
      class="w-full mb-4 p-3 border rounded focus:ring-2 focus:ring-indigo-500">

    <!-- Submit -->
    <button onclick="clickSound.play(); resetPassword()"
      class="w-full bg-indigo-600 text-white py-3 rounded hover:bg-indigo-700 transition">
      Reset Password
    </button>

    <p class="text-center text-sm mt-4 text-gray-500 cursor-pointer"
       onclick="window.location.href='login.html'">
      Back to Login
    </p>
  </div>

<script>
const clickSound = new Audio("sounds/click.mp3");

async function resetPassword() {
  const email = document.getElementById("email").value.trim();
  const otp = document.getElementById("otp").value.trim();
  const newPassword = document.getElementById("newPassword").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  if (!email || !otp || !newPassword || !confirmPassword) {
    alert("All fields are required");
    return;
  }

  if (newPassword !== confirmPassword) {
    alert("Passwords do not match");
    return;
  }

  const res = await fetch("http://localhost:5000/api/auth/reset-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, otp, newPassword })
  });

  const data = await res.json();

  if (res.ok) {
    alert("Password reset successful. Please login.");
    window.location.href = "login.html";
  } else {
    alert(data.message || "Reset failed");
  }
}
</script>

</body>
</html>
